<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>proX Academy - Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f1729",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0F172A", 
                        "card-dark": "#1e293b",
                        "input-dark": "#0f1729",
                        "border-dark": "#334155",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for dark theme code vibe */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0F172A; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="w-full border-b border-solid border-slate-200 dark:border-border-dark bg-white dark:bg-background-dark px-6 py-4">
<div class="mx-auto flex max-w-7xl items-center justify-between">
<div class="flex items-center gap-3 cursor-pointer">
<div class="flex items-center justify-center size-8 rounded text-white">
<!-- Custom Logo SVG -->
<svg fill="none" height="32" viewbox="0 0 48 48" width="32" xmlns="http://www.w3.org/2000/svg">
<path class="dark:text-white text-primary" d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="white"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">proX Academy</h2>
</div>
<div class="flex gap-3">
<button class="hidden sm:flex h-9 items-center justify-center px-4 rounded-lg text-slate-900 dark:text-white text-sm font-semibold hover:bg-slate-100 dark:hover:bg-card-dark transition-colors">
                    Sign Up
                </button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4 relative overflow-hidden">
<!-- Abstract Background Pattern -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900 via-background-dark to-background-dark"></div>
<!-- Grid pattern simulating code editor lines -->
<div class="absolute inset-0" style="background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<div class="w-full max-w-[480px] z-10">
<!-- Headlines -->
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-white text-3xl md:text-4xl font-bold tracking-tight mb-2">Welcome back, Developer.</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Initialize your learning path to continue.</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-card-dark border border-slate-200 dark:border-border-dark rounded-xl shadow-xl p-6 md:p-8">
<form action="#" class="flex flex-col gap-5">
<!-- Email Field -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-white text-sm font-medium">Email or Username</span>
<input class="w-full h-11 px-4 rounded-lg bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-border-dark text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-sm" placeholder="user@example.com" type="email"/>
</label>
<!-- Password Field -->
<label class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="text-slate-900 dark:text-white text-sm font-medium">Password</span>
<a class="text-blue-600 dark:text-blue-400 text-xs font-medium hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full h-11 px-4 pr-10 rounded-lg bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-border-dark text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-sm" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<!-- Login Button -->
<button class="mt-2 w-full h-11 bg-slate-900 dark:bg-white hover:bg-slate-800 dark:hover:bg-slate-200 text-white dark:text-slate-900 font-bold rounded-lg transition-colors flex items-center justify-center gap-2" type="button">
<span>Log In</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-border-dark"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase font-semibold tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-slate-200 dark:border-border-dark"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 h-10 px-4 rounded-lg bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-border-dark hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button">
<svg aria-hidden="true" class="w-5 h-5 text-slate-900 dark:text-white" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">GitHub</span>
</button>
<button class="flex items-center justify-center gap-2 h-10 px-4 rounded-lg bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-border-dark hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M23.766 12.2764C23.766 11.4607 23.6999 10.6406 23.5588 9.83807H12.24V14.4591H18.7217C18.4528 15.9494 17.5885 17.2678 16.323 18.1056V21.1039H20.19C22.4608 19.0139 23.766 15.9274 23.766 12.2764Z" fill="#4285F4"></path>
<path d="M12.2401 24.0008C15.4766 24.0008 18.2059 22.9382 20.1945 21.1039L16.3275 18.1055C15.2517 18.8375 13.8627 19.252 12.2445 19.252C9.11388 19.252 6.45946 17.1399 5.50705 14.3003H1.5166V17.3912C3.55371 21.4434 7.7029 24.0008 12.2401 24.0008Z" fill="#34A853"></path>
<path d="M5.50253 14.3003C5.00236 12.8099 5.00236 11.1961 5.50253 9.70575V6.61481H1.51649C-0.18551 10.0056 -0.18551 14.0004 1.51649 17.3912L5.50253 14.3003Z" fill="#FBBC05"></path>
<path d="M12.2401 4.74966C13.9509 4.7232 15.6044 5.36697 16.8434 6.54867L20.2695 3.12262C18.1001 1.0855 15.2208 -0.034466 12.2401 0.000808666C7.7029 0.000808666 3.55371 2.55822 1.5166 6.61481L5.50264 9.70575C6.45064 6.86173 9.10947 4.74966 12.2401 4.74966Z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Google</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Don't have an account? 
                        <a class="font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Footer Text -->
<div class="mt-8 text-center opacity-60">
<p class="text-xs text-slate-500 dark:text-slate-500">© 2024 proX Academy. All rights reserved.</p>
</div>
</div>
</main>
</body></html>
